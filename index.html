<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Message4you</title>
  <style>
    body {
      background: rgb(38, 35, 35);
      font-family: Tahoma, sans-serif;
      color: #222;
      text-align: center;
      padding: 30px;
    }

    h1 {
      font-size: 120px;
      margin-bottom: 5px;
      color: pink;
      text-shadow: 1px 1px 6px rgba(0,0,0,0.2);
    }

    h2 {
      font-size: 40px;
      margin-top: 0;
      color: pink;
    }

    #countdownText {
      font-size: 30px;
      font-weight: bold;
      color: red;
      margin: 12px 0;
    }

    #messageBox {
      margin: 20px auto;
      padding: 20px;
      background: pink;
      border-radius: 12px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      overflow-y: auto;
      width: 80%;
      min-height: 200px;
      max-height: 400px;
    }

    #message {
      font-size: 28px;
      text-align: left;
      margin: 0;
      word-wrap: break-word;
      line-height: 1.5;
    }

    #status {
      margin-top: 15px;
      font-size: 30px;
      font-weight: bold;
      color: red;
    }

    .after-text {
      color: pink;
    }

   
    form {
      margin-top: 40px;
      background: pink;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.4);
      width: 80%;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }

    label {
      display: block;
      font-size: 18px;
      margin-bottom: 5px;
      color: black;
    }

    input, textarea {
      width: 98%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid black;
      border-radius: 10px;
      font-size: 16px;
    }

    button {
      background: white;
      color: #222;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #ff9eb5;
    }
  </style>
</head>
<body>
  <h1>Message4you</h1>
  <h2 id="to"></h2>

  <p id="countdownText">
    This message will self-destruct in <span id="countdown"></span> seconds…
  </p>

  <div id="messageBox">
    <p id="message"></p>
  </div>

  <p id="status"></p>

  
  <form action="https://formspree.io/f/xpwjkayd" method="POST">
    <h2 style="text-align:center; color:white;">Send me a message</h2>
    <label for="name">Your Name (optional):</label>
    <input type="text" id="name" name="name" placeholder="Enter your name or leave blank">

    <label for="profile">Your FB/IG/Link (optional):</label>
    <input type="url" id="profile" name="profile" placeholder="https://facebook.com/...">

    <label for="recipient">Link of the person you want me to send (optional):</label>
    <input type="url" id="recipient" name="recipient" placeholder="https://...">

    <label for="messageInput">Your Message:</label>
    <textarea id="messageInput" name="message" rows="5" required placeholder="Type your message here..."></textarea>

    <button type="submit">Send</button>
  </form>

  <script>
    const DURATION_SECONDS = 10;
    const TO_TEXT = "";
    const SECRET_MESSAGE = "Hi, if you'rereadingthis, snack na";
    const SELF_DESTRUCT_TEXT = "Message destroyed!☹️";
    const AFTER_TEXT = "— Anonymous";

    function hashString(str) {
      let h = 0x811c9dc5;
      for (const ch of str) {
        h ^= ch.codePointAt(0);
        h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
        h >>>= 0;
      }
      return ("00000000" + h.toString(16)).slice(-8);
    }
    const UNIQUE_KEY = "msg_" + hashString(SECRET_MESSAGE);

    const toEl = document.getElementById("to");
    const countdownEl = document.getElementById("countdown");
    const countdownTextEl = document.getElementById("countdownText");
    const messageEl = document.getElementById("message");
    const statusEl = document.getElementById("status");

    toEl.textContent = TO_TEXT;

    function showDestroyed() {
      messageEl.textContent = "";
      statusEl.textContent = SELF_DESTRUCT_TEXT;
      countdownTextEl.innerHTML = `<span class="after-text">${AFTER_TEXT}</span>`;
    }

    if (localStorage.getItem(UNIQUE_KEY) === "true") {
      showDestroyed();
    } else {
      messageEl.textContent = SECRET_MESSAGE;
      let remaining = DURATION_SECONDS;
      countdownEl.textContent = remaining;

      const timer = setInterval(() => {
        remaining--;
        countdownEl.textContent = remaining;

        if (remaining <= 0) {
          clearInterval(timer);
          localStorage.setItem(UNIQUE_KEY, "true");
          showDestroyed();
        }
      }, 1000);
    }
  </script>
</body>
</html>

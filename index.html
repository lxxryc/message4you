<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message4you</title>
  <style>
    /* Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden; /* prevent scrolling */
      font-family: Tahoma, sans-serif;
      background: rgb(38, 35, 35);
      color: #222;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 2vh 2vw;
    }

    h1 {
      font-size: 8vh;
      color: pink;
      text-shadow: 1px 1px 6px rgba(0,0,0,0.2);
      text-align: center;
    }

    #countdownText {
      font-size: 3vh;
      font-weight: bold;
      color: red;
      text-align: center;
    }

    #messageBox {
      width: 90vw;
      max-width: 800px;
      height: 35vh; /* fixed fraction of screen */
      background: pink;
      border-radius: 12px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.6);
      padding: 1.5vh 1vw;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      overflow-y: auto;
    }

    #message {
      font-size: 2.5vh;
      line-height: 1.4;
      width: 100%;
      word-wrap: break-word;
    }

    #status {
      font-size: 3vh;
      color: red;
      font-weight: bold;
      text-align: center;
    }

    .after-text {
      color: pink;
    }

    form {
      width: 90vw;
      max-width: 800px;
      background: pink;
      padding: 2vh 2vw;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    form h2 {
      text-align: center;
      color: white;
      margin-bottom: 1vh;
      font-size: 3vh;
    }

    label {
      font-size: 2vh;
      color: black;
      margin: 0.5vh 0 0.5vh 0;
    }

    input, textarea {
      width: 100%;
      padding: 1vh 1vw;
      margin-bottom: 1vh;
      border-radius: 10px;
      border: 1px solid black;
      font-size: 2vh;
      resize: none; /* prevent drag/resize */
    }

    button {
      padding: 1.2vh 1vw;
      font-size: 2.5vh;
      font-weight: bold;
      background: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff9eb5;
    }

    /* Responsive scaling (just in case) */
    @media (max-width: 480px) {
      h1 { font-size: 10vw; }
      #countdownText { font-size: 4vw; }
      #message { font-size: 3.5vw; }
      form h2 { font-size: 4vw; }
      input, textarea { font-size: 3vw; }
      button { font-size: 4vw; }
    }
  </style>
</head>
<body>
  <h1>Message4you</h1>
  <p id="countdownText">This message will self-destruct in <span id="countdown"></span> seconds…</p>

  <div id="messageBox">
    <p id="message"></p>
  </div>

  <p id="status"></p>

  <form action="https://formspree.io/f/xpwjkayd" method="POST">
    <h2>Send me a message</h2>
    <label for="name">Your Name (optional):</label>
    <input type="text" id="name" name="name" placeholder="Enter your name or leave blank">

    <label for="profile">Your FB/IG/Link (optional):</label>
    <input type="url" id="profile" name="profile" placeholder="https://facebook.com/...">

    <label for="recipient">Link of the person you want me to send (optional):</label>
    <input type="url" id="recipient" name="recipient" placeholder="https://...">

    <label for="messageInput">Your Message:</label>
    <textarea id="messageInput" name="message" rows="5" required placeholder="Type your message here..."></textarea>

    <button type="submit">Send</button>
  </form>

  <script>
    const DURATION_SECONDS = 10;
    const SECRET_MESSAGE = "This is a sample secret message. It will self-destruct once the timer reaches zero.";
    const SELF_DESTRUCT_TEXT = "⚠️ Message destroyed!";
    const AFTER_TEXT = "— Anonymous";

    function hashString(str) {
      let h = 0x811c9dc5;
      for (const ch of str) {
        h ^= ch.codePointAt(0);
        h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
        h >>>= 0;
      }
      return ("00000000" + h.toString(16)).slice(-8);
    }

    const UNIQUE_KEY = "msg_" + hashString(SECRET_MESSAGE);
    const countdownEl = document.getElementById("countdown");
    const messageEl = document.getElementById("message");
    const statusEl = document.getElementById("status");

    function showDestroyed() {
      messageEl.textContent = "";
      statusEl.textContent = SELF_DESTRUCT_TEXT;
    }

    if (localStorage.getItem(UNIQUE_KEY) === "true") {
      showDestroyed();
    } else {
      messageEl.textContent = SECRET_MESSAGE;
      let remaining = DURATION_SECONDS;
      countdownEl.textContent = remaining;
      const timer = setInterval(() => {
        remaining--;
        countdownEl.textContent = remaining;
        if (remaining <= 0) {
          clearInterval(timer);
          localStorage.setItem(UNIQUE_KEY, "true");
          showDestroyed();
        }
      }, 1000);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message4you</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }

  html, body {
    height: 100%;
    width: 100%;
    font-family: Tahoma, sans-serif;
    background: #111;
    color: #eee;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 2vh 2vw;
  }

  h1 {
    font-size: clamp(40px, 6vw, 80px);
    color: #fff;
    text-shadow: 1px 1px 6px rgba(255,255,255,0.2);
    margin-bottom: 1vh;
    text-align: center;
  }

  #to {
    font-size: clamp(18px, 2.5vw, 28px);
    color: #ccc;
    text-align: center;
    margin-bottom: 1vh;
  }

  #countdownText {
    font-size: clamp(12px, 1.8vw, 16px);
    color: #ff4444;
    font-weight: bold;
    text-align: center;
    margin: 1vh 0 2vh 0;
    text-shadow: 0 0 4px #ff4444;
    animation: pulse 1s infinite;
  }

  /* Glow animation for countdown */
  @keyframes pulse {
    0% { text-shadow: 0 0 2px #ff4444, 0 0 6px #ff4444; }
    50% { text-shadow: 0 0 10px #ff6666, 0 0 20px #ff4444; }
    100% { text-shadow: 0 0 2px #ff4444, 0 0 6px #ff4444; }
  }

  #messageBox {
    width: 90vw;
    max-width: 800px;
    height: 25vh;
    background: #222;
    border-radius: 12px;
    box-shadow: 0 0 12px rgba(255,255,255,0.1);
    padding: 1.5vh 1vw;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    overflow-y: auto;
    margin-bottom: 1vh;
    transition: box-shadow 0.5s;
  }

  /* Glow effect when timer is < 5 seconds */
  #messageBox.glow {
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.7);
  }

  #message {
    font-size: clamp(14px, 1.6vw, 18px);
    line-height: 1.5;
    word-wrap: break-word;
    color: #fff;
  }

  #status {
    font-size: clamp(18px, 2vw, 24px);
    color: #fff;
    font-weight: bold;
    text-align: center;
    margin: 0.5vh 0 2vh 0;
  }

  .after-text {
    color: #ccc;
    display: block;
    margin-top: 1vh;
    font-size: clamp(16px, 1.8vw, 20px);
  }

  form {
    width: 90vw;
    max-width: 800px;
    background: #222;
    padding: 1.5vh 2vw;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.7);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    margin-bottom: 1vh;
  }

  form h2 {
    text-align: center;
    color: #fff;
    font-size: clamp(20px, 3vw, 28px);
    margin-bottom: 1.5vh;
  }

  label {
    font-size: clamp(14px, 1.8vw, 16px);
    color: #ccc;
    margin: 0.5vh 0;
  }

  input, textarea {
    width: 100%;
    padding: 0.8vh 1vw;
    margin-bottom: 1vh;
    border-radius: 10px;
    border: 1px solid #555;
    font-size: clamp(14px, 1.8vw, 16px);
    background: #111;
    color: #eee;
    resize: none;
  }

  button {
    padding: 1vh 1vw;
    font-size: clamp(14px, 1.8vw, 16px);
    font-weight: bold;
    background: #fff;
    color: #111;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 1vh;
  }

  button:hover {
    background: #ccc;
  }

  @media (max-width: 480px) {
    h1 { font-size: 12vw; }
    #to { font-size: 4vw; }
    #countdownText { font-size: 3.5vw; }
    #message { font-size: 3vw; }
    #status { font-size: 4vw; }
    .after-text { font-size: 4vw; margin-top: 1vw; }
    form h2 { font-size: 4vw; }
    input, textarea { font-size: 3vw; }
    button { font-size: 3.5vw; }
  }
</style>
</head>
<body>

<h1>Message4you</h1>
<h2 id="to"></h2>

<p id="countdownText">
  This message will self-destruct in <span id="countdown"></span> seconds…
</p>

<div id="messageBox">
  <p id="message"></p>
</div>

<p id="status"></p>

<form action="https://formspree.io/f/xpwjkayd" method="POST">
  <h2>Send a message</h2>

  <label for="name">Your Name (optional):</label>
  <input type="text" id="name" name="name" placeholder="Enter your name or leave blank">

  <label for="profile">Your FB/IG/Link (optional):</label>
  <input type="url" id="profile" name="profile" placeholder="https://facebook.com/...">

  <label for="recipient">Link of the person you want me to send:</label>
  <input type="url" id="recipient" name="recipient" placeholder="https://...">

  <label for="messageInput">Your Message:</label>
  <textarea id="messageInput" name="message" rows="5" required placeholder="Type your message here..."></textarea>

  <button type="submit">Send</button>
</form>

<script>
  const DURATION_SECONDS = 10;
  const TO_TEXT = "";
  const SECRET_MESSAGE = "HI ILOVEYOU SO MUCH";
  const SELF_DESTRUCT_TEXT = "Message destroyed!";
  const AFTER_TEXT = "— Anonymous";

  const toEl = document.getElementById("to");
  const countdownEl = document.getElementById("countdown");
  const countdownTextEl = document.getElementById("countdownText");
  const messageEl = document.getElementById("message");
  const statusEl = document.getElementById("status");
  const messageBoxEl = document.getElementById("messageBox");

  toEl.textContent = TO_TEXT;

  function hashString(str) {
    let h = 0x811c9dc5;
    for (const ch of str) {
      h ^= ch.codePointAt(0);
      h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
      h >>>= 0;
    }
    return ("00000000" + h.toString(16)).slice(-8);
  }

  const UNIQUE_KEY = "msg_" + hashString(SECRET_MESSAGE);

  function showDestroyed() {
    messageEl.textContent = "";
    statusEl.textContent = SELF_DESTRUCT_TEXT;
    countdownTextEl.innerHTML = `<span class="after-text">${AFTER_TEXT}</span>`;
    messageBoxEl.classList.remove('glow');
  }

  if (localStorage.getItem(UNIQUE_KEY) === "true") {
    showDestroyed();
  } else {
    messageEl.textContent = SECRET_MESSAGE;
    let remaining = DURATION_SECONDS;
    countdownEl.textContent = remaining;

    const timer = setInterval(() => {
      remaining--;
      countdownEl.textContent = remaining;

      // Add glow effect in message box when remaining <= 5
      if (remaining <= 5) {
        messageBoxEl.classList.add('glow');
        countdownTextEl.style.animationDuration = `${0.5 + remaining * 0.1}s`; // faster pulse as timer decreases
      }

      if (remaining <= 0) {
        clearInterval(timer);
        localStorage.setItem(UNIQUE_KEY, "true");
        showDestroyed();
      }
    }, 1000);
  }
</script>

</body>
</html>
